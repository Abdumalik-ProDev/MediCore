services:
  postgres:
    image: postgres:16-alpine
    container_name: mrmspg
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: mrmspg
      POSTGRES_USER: mrmspg
      POSTGRES_PASSWORD: mrmspg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mrmspg']
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  api:
    build: ./backend
    container_name: mrmsapi
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mrmspg
      DB_USER: mrmspg
      DB_PASSWORD: mrmspg
      JWT_SECRET: changemeinproduction
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000

  frontend:
    build: ./frontend
    container_name: mrmsui
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - api

volumes:
  pgdata:
